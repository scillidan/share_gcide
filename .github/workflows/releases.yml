name: Create Releases

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip

    - name: Install Python packages
      run: |
        pip install pyglossary lxml beautifulsoup4 python-idzip tqdm

    - name: Download gcide.zip from FireDict
      run: |
        curl -LO "http://tovotu.de/data/stardict/gcide.zip"

    - name: Decompress archive
      run: |
        unzip gcide.zip

    - name: Run pyglossary and related processing
      run: |
        pyglossary ./gcide/gcide.ifo ./gcide.txt --read-format=Stardict --write-format=Tabfile --name=GCIDE
        python text_format.py ./gcide.txt ./gcide-formatted.txt
        pyglossary ./gcide-formatted.txt ./gcide-stardict --read-format=Tabfile --write-format=Stardict --name=GCIDE
        pyglossary ./gcide-formatted.txt ./gcide-yomichan.zip --read-format=Tabfile --write-format=Yomichan --name=GCIDE

    - name: Create zip files for Stardict sets
      run: |
        for base in *.ifo; do
          prefix="${base%.ifo}"
          if [[ ! -f "$prefix.ifo" ]]; then
            echo "Skipping $prefix, missing $prefix.ifo"
            continue
          fi
          if [[ ! -f "$prefix.idx" ]]; then
            echo "Skipping $prefix, missing $prefix.idx"
            continue
          fi
          dict_file=""
          if [[ -f "$prefix.dict.dz" ]]; then
            dict_file="$prefix.dict.dz"
          elif [[ -f "$prefix.dict" ]]; then
            dict_file="$prefix.dict"
          else
            echo "Skipping $prefix, missing $prefix.dict.dz or $prefix.dict"
            continue
          fi
          echo "Creating ${prefix}.zip from $prefix.ifo, $dict_file, $prefix.idx"
          zip -j "${prefix}.zip" "$prefix.ifo" "$dict_file" "$prefix.idx"
        done

    - name: Pre-release
      run: echo "${{ github.sha }}" > Release.txt

    - name: Extract short name from github.ref
      id: tag_short
      run: echo "short=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        tag_name: ${{ github.ref }}
        name: ${{ steps.tag_short.outputs.short }}
        files: |
          gcide-*.zip
          gcide-*.txt
          Release.txt
